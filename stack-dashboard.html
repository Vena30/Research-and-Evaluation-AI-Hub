<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaxAce Stack Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface-alt:#f1efe8;
  --border:rgba(0,0,0,0.09);--border-strong:rgba(0,0,0,0.16);
  --text:#1a1a18;--text-2:#5f5e5a;--text-3:#888780;
  --teal:#0f6e56;--teal-bg:#e1f5ee;--teal-text:#085041;
  --purple:#534ab7;--purple-bg:#eeedfe;--purple-text:#3c3489;
  --amber:#ba7517;--amber-bg:#faeeda;--amber-text:#633806;
  --red:#a32d2d;--red-bg:#fcebeb;--red-text:#791f1f;
  --gray-bg:#f1efe8;--gray-text:#444441;
  --blue:#185fa5;--blue-bg:#e6f1fb;--blue-text:#0c447c;
  --radius:8px;--card-radius:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1a18;--surface:#2c2c2a;--surface-alt:#242422;
  --border:rgba(255,255,255,0.07);--border-strong:rgba(255,255,255,0.13);
  --text:#e8e6de;--text-2:#9c9a92;--text-3:#5f5e5a;
  --teal-bg:#04342c;--teal-text:#9fe1cb;
  --purple-bg:#26215c;--purple-text:#cecbf6;
  --amber-bg:#412402;--amber-text:#fac775;
  --red-bg:#501313;--red-text:#f7c1c1;
  --gray-bg:#2c2c2a;--gray-text:#b4b2a9;
  --blue-bg:#042c53;--blue-text:#b5d4f4;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem;font-size:14px;line-height:1.5}
.wrap{max-width:960px;margin:0 auto}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:12px}
.brand{display:flex;align-items:center;gap:10px}
.logomark{width:34px;height:34px;border-radius:9px;background:var(--teal);color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:-0.5px}
.brand-text h1{font-size:17px;font-weight:500;color:var(--text)}
.brand-text p{font-size:12px;color:var(--text-3);margin-top:1px}
.header-actions{display:flex;gap:8px;align-items:center}

/* Stat cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:1.5rem}
.stat{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--card-radius);padding:1rem 1.1rem}
.stat-label{font-size:12px;color:var(--text-3);margin-bottom:4px}
.stat-value{font-size:22px;font-weight:500;color:var(--text);line-height:1}
.stat-sub{font-size:11px;color:var(--text-3);margin-top:4px}

/* Filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.2rem;align-items:center}
.filter-btn{padding:5px 12px;border-radius:20px;border:0.5px solid var(--border-strong);background:var(--surface-alt);color:var(--text-2);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.filter-btn:hover,.filter-btn.active{background:var(--teal-bg);color:var(--teal-text);border-color:var(--teal)}
.search{padding:6px 12px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;width:180px}
.search:focus{outline:none;border-color:var(--teal)}
.search::placeholder{color:var(--text-3)}
.filters-right{margin-left:auto;display:flex;gap:8px;align-items:center}

/* Table */
.table-wrap{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--card-radius);overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead tr{background:var(--surface-alt);border-bottom:0.5px solid var(--border)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:500;color:var(--text-3);letter-spacing:0.04em;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--text-2)}
th .sort-icon{margin-left:4px;opacity:0.4;font-style:normal}
th.sorted .sort-icon{opacity:1;color:var(--teal)}
td{padding:11px 14px;border-bottom:0.5px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface-alt)}

/* Column widths */
col.c-tool{width:22%}
col.c-category{width:14%}
col.c-cost{width:11%}
col.c-billing{width:10%}
col.c-status{width:11%}
col.c-renewal{width:13%}
col.c-team{width:12%}
col.c-actions{width:7%}

.tool-name{font-weight:500;color:var(--text)}
.tool-sub{font-size:11px;color:var(--text-3);margin-top:2px}

.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px;white-space:nowrap}
.badge-active{background:var(--teal-bg);color:var(--teal-text)}
.badge-review{background:var(--amber-bg);color:var(--amber-text)}
.badge-unused{background:var(--red-bg);color:var(--red-text)}
.badge-cancel{background:var(--gray-bg);color:var(--gray-text)}

.cat-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:var(--surface-alt);color:var(--text-2);border:0.5px solid var(--border)}

.renewal-soon{color:var(--amber);font-weight:500}
.renewal-urgent{color:var(--red);font-weight:500}
.renewal-ok{color:var(--text-2)}

.cost-val{font-weight:500;font-family:'SF Mono',monospace,sans-serif;font-size:12px}

.action-btn{background:none;border:none;color:var(--text-3);cursor:pointer;padding:4px 6px;border-radius:var(--radius);font-size:16px;line-height:1;transition:all .15s}
.action-btn:hover{background:var(--surface-alt);color:var(--text)}

/* Empty */
.empty{text-align:center;padding:3rem 1rem;color:var(--text-3);font-size:13px}

/* Edit modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--card-radius);padding:1.5rem;width:100%;max-width:440px;border:0.5px solid var(--border-strong)}
.modal h2{font-size:16px;font-weight:500;margin-bottom:1.2rem;color:var(--text)}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:var(--text-2);margin-bottom:4px}
.form-row input,.form-row select{width:100%;padding:8px 10px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-alt);color:var(--text);font-size:13px;font-family:inherit}
.form-row input:focus,.form-row select:focus{outline:none;border-color:var(--teal)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1.2rem}
.btn{padding:7px 16px;border-radius:var(--radius);font-size:13px;font-family:inherit;cursor:pointer;border:0.5px solid var(--border-strong);background:var(--surface-alt);color:var(--text);transition:all .15s}
.btn:hover{background:var(--teal-bg);color:var(--teal-text);border-color:var(--teal)}
.btn-primary{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-primary:hover{background:#0d5e49;color:#fff}
.btn-danger{background:none;border:none;color:var(--red);font-size:12px;padding:4px 8px;cursor:pointer;font-family:inherit;margin-right:auto}
.btn-danger:hover{text-decoration:underline}

/* Footer */
footer{margin-top:1.5rem;font-size:11px;color:var(--text-3);text-align:center}

@media(max-width:700px){
  col.c-billing,col.c-team{width:0}
  .hide-mobile{display:none}
  .search{width:130px}
}
</style>
</head>

<div class="wrap">

  <div class="header">
    <div class="brand">
      <div class="logomark">TA</div>
      <div class="brand-text">
        <h1>Stack dashboard</h1>
        <p>TaxAce Group Inc. · R&amp;E Lead view</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="openAdd()">+ Add tool</button>
      <button class="btn" onclick="exportCSV()">Export CSV</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" data-filter="Active" onclick="setFilter('Active',this)">Active</button>
    <button class="filter-btn" data-filter="Review" onclick="setFilter('Review',this)">Review needed</button>
    <button class="filter-btn" data-filter="Unused" onclick="setFilter('Unused',this)">Unused</button>
    <button class="filter-btn" data-filter="Cancel" onclick="setFilter('Cancel',this)">To cancel</button>
    <div class="filters-right">
      <input class="search" type="search" placeholder="Search tools…" oninput="renderTable()">
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <colgroup>
        <col class="c-tool"><col class="c-category"><col class="c-cost">
        <col class="c-billing"><col class="c-status"><col class="c-renewal">
        <col class="c-team"><col class="c-actions">
      </colgroup>
      <thead>
        <tr>
          <th onclick="sortBy('name')">Tool <i class="sort-icon" id="sort-name">↕</i></th>
          <th onclick="sortBy('category')">Category <i class="sort-icon" id="sort-category">↕</i></th>
          <th onclick="sortBy('cost')">Monthly <i class="sort-icon" id="sort-cost">↕</i></th>
          <th class="hide-mobile" onclick="sortBy('billing')">Billing <i class="sort-icon" id="sort-billing">↕</i></th>
          <th onclick="sortBy('status')">Status <i class="sort-icon" id="sort-status">↕</i></th>
          <th onclick="sortBy('renewal')">Renewal <i class="sort-icon" id="sort-renewal">↕</i></th>
          <th class="hide-mobile" onclick="sortBy('team')">Team <i class="sort-icon" id="sort-team">↕</i></th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">No tools match this filter.</div>
  </div>

  <footer id="footer"></footer>
</div>

<!-- Edit / Add Modal -->
<div class="modal-bg" id="modal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modal-title">Add tool</h2>
    <div class="form-row">
      <label>Tool name</label>
      <input id="f-name" type="text" placeholder="e.g. ProSeries">
    </div>
    <div class="form-row">
      <label>Description (optional)</label>
      <input id="f-desc" type="text" placeholder="e.g. Tax preparation software">
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>Category</label>
        <select id="f-category">
          <option>Tax software</option>
          <option>Accounting</option>
          <option>Client portal</option>
          <option>Payroll</option>
          <option>Productivity</option>
          <option>Communication</option>
          <option>AI / Automation</option>
          <option>Security</option>
          <option>Design & Creative</option>
          <option>Sales & Marketing</option>
          <option>Training & Education</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-row">
        <label>Status</label>
        <select id="f-status">
          <option>Active</option>
          <option>Review</option>
          <option>Unused</option>
          <option>Cancel</option>
        </select>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>Cost (USD)</label>
        <input id="f-cost" type="number" placeholder="0.00" step="0.01" min="0">
      </div>
      <div class="form-row">
        <label>Billing cycle</label>
        <select id="f-billing">
          <option>Monthly</option>
          <option>Annual</option>
          <option>Per user/mo</option>
          <option>One-time</option>
        </select>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>Renewal date</label>
        <input id="f-renewal" type="date">
      </div>
      <div class="form-row">
        <label>Team that uses it</label>
        <input id="f-team" type="text" placeholder="e.g. All, Admin, R&E">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-danger" id="delete-btn" onclick="deleteCurrentTool()" style="display:none">Delete tool</button>
      <button class="btn" onclick="document.getElementById('modal').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTool()">Save</button>
    </div>
  </div>
</div>

function load() {
  try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : SEED; }
  catch(e) { return SEED; }
}
function save(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

let tools = load();

let sortDir = 1;
let editingId = null;

function monthlyCost(t) {
  if (t.billing === 'Annual') return t.cost / 12;
  if (t.billing === 'One-time') return 0;
  return t.cost;
}

function daysUntil(dateStr) {
  if (!dateStr) return 9999;
  const d = new Date(dateStr);
  const now = new Date();
  return Math.ceil((d - now) / 86400000);
}

function fmtDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function renewalClass(dateStr) {
  const days = daysUntil(dateStr);
  if (days < 0) return 'renewal-urgent';
  if (days <= 30) return 'renewal-urgent';
  if (days <= 60) return 'renewal-soon';
  return 'renewal-ok';
}

function renderStats() {
  const active = tools.filter(t => t.status === 'Active');
  const monthly = tools.reduce((s,t) => s + monthlyCost(t), 0);
  const annual = monthly * 12;
  const renewingSoon = tools.filter(t => daysUntil(t.renewal) <= 30 && daysUntil(t.renewal) >= 0).length;
  const needAction = tools.filter(t => t.status === 'Review' || t.status === 'Unused' || t.status === 'Cancel').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Monthly spend</div><div class="stat-value">$${monthly.toFixed(0)}</div><div class="stat-sub">$${annual.toFixed(0)} annually</div></div>
    <div class="stat"><div class="stat-label">Total tools</div><div class="stat-value">${tools.length}</div><div class="stat-sub">${active.length} active</div></div>
    <div class="stat"><div class="stat-label">Renewing in 30 days</div><div class="stat-value" style="color:${renewingSoon>0?'var(--amber)':'var(--text)'}">${renewingSoon}</div><div class="stat-sub">contracts</div></div>
    <div class="stat"><div class="stat-label">Need attention</div><div class="stat-value" style="color:${needAction>0?'var(--red)':'var(--text)'}">${needAction}</div><div class="stat-sub">review, unused, or cancel</div></div>
  `;
  document.getElementById('footer').textContent = `Last updated ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})} · TaxAce R&E`;
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  document.querySelectorAll('th .sort-icon').forEach(i => { i.parentElement.classList.remove('sorted'); i.textContent = '↕'; });
  const th = document.getElementById('sort-' + key);
  if (th) { th.parentElement.classList.add('sorted'); th.textContent = sortDir === 1 ? '↑' : '↓'; }
  renderTable();
}

function renderTable() {
  const q = document.querySelector('.search').value.toLowerCase();
  let filtered = tools.filter(t => {
    const matchFilter = currentFilter === 'all' || t.status === currentFilter;
    const matchSearch = !q || t.name.toLowerCase().includes(q) || t.category.toLowerCase().includes(q) || (t.team||'').toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });
  filtered.sort((a,b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (sortKey === 'cost') { av = monthlyCost(a); bv = monthlyCost(b); }
    if (sortKey === 'renewal') { av = daysUntil(a.renewal); bv = daysUntil(b.renewal); }
    if (av < bv) return -sortDir;
    if (av > bv) return sortDir;
    return 0;
  });

  const statusMap = {Active:'badge-active',Review:'badge-review',Unused:'badge-unused',Cancel:'badge-cancel'};
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = filtered.map(t => {
    const mc = monthlyCost(t);
    return `<tr>
      <td><div class="tool-name">${esc(t.name)}</div>${t.desc?`<div class="tool-sub">${esc(t.desc)}</div>`:''}</td>
      <td><span class="cat-badge">${esc(t.category)}</span></td>
      <td><span class="cost-val">$${mc.toFixed(0)}/mo</span></td>
      <td class="hide-mobile" style="color:var(--text-2);font-size:12px">${esc(t.billing)}</td>
      <td><span class="badge ${statusMap[t.status]||'badge-active'}">${esc(t.status)}</span></td>
      <td><span class="${renewalClass(t.renewal)}" style="font-size:12px">${fmtDate(t.renewal)}</span></td>
      <td class="hide-mobile" style="color:var(--text-2);font-size:12px">${esc(t.team||'—')}</td>
      <td><button class="action-btn" onclick="openEdit(${t.id})" title="Edit">✎</button></td>
    </tr>`;
  }).join('');

  document.getElementById('empty').style.display = filtered.length ? 'none' : 'block';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openAdd() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add tool';
  document.getElementById('delete-btn').style.display = 'none';
  ['name','desc','cost','renewal','team'].forEach(f => document.getElementById('f-'+f).value = '');
  document.getElementById('f-category').value = 'Tax software';
  document.getElementById('f-status').value = 'Active';
  document.getElementById('f-billing').value = 'Monthly';
  document.getElementById('modal').classList.add('open');
}

function openEdit(id) {
  const t = tools.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit tool';
  document.getElementById('delete-btn').style.display = 'inline-block';
  document.getElementById('f-name').value = t.name;
  document.getElementById('f-desc').value = t.desc || '';
  document.getElementById('f-category').value = t.category;
  document.getElementById('f-status').value = t.status;
  document.getElementById('f-cost').value = t.cost;
  document.getElementById('f-billing').value = t.billing;
  document.getElementById('f-renewal').value = t.renewal || '';
  document.getElementById('f-team').value = t.team || '';
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  document.getElementById('modal').classList.remove('open');
}

function saveTool() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const data = {
    name, desc: document.getElementById('f-desc').value.trim(),
    category: document.getElementById('f-category').value,
    status: document.getElementById('f-status').value,
    cost: parseFloat(document.getElementById('f-cost').value) || 0,
    billing: document.getElementById('f-billing').value,
    renewal: document.getElementById('f-renewal').value,
    team: document.getElementById('f-team').value.trim(),
  };
  if (editingId) {
    const i = tools.findIndex(t => t.id === editingId);
    if (i > -1) tools[i] = {...tools[i], ...data};
  } else {
    data.id = Date.now();
    tools.push(data);
  }
  save(tools);
  document.getElementById('modal').classList.remove('open');
  renderStats(); renderTable();
}

function deleteCurrentTool() {
  if (!editingId) return;
  if (!confirm('Remove this tool from the dashboard?')) return;
  tools = tools.filter(t => t.id !== editingId);
  save(tools);
  document.getElementById('modal').classList.remove('open');
  renderStats(); renderTable();
}

function exportCSV() {
  const headers = ['Name','Description','Category','Cost (USD)','Billing','Monthly Cost','Status','Renewal','Team'];
  const rows = tools.map(t => [t.name,t.desc||'',t.category,t.cost,t.billing,monthlyCost(t).toFixed(2),t.status,t.renewal||'',t.team||''].map(v => `"${String(v).replace(/"/g,'""')}"`));
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'taxace-stack-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

renderStats(); renderTable(); sortBy('name');
</script>
</body>
</html>
